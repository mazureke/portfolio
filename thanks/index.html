<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One last step — Emilie Mazurek</title>
  <meta name="description" content="To unlock your resources, please check your email and confirm your subscription by clicking the verification link.">
  <link rel="icon" href="/brand_assets/Rainbow Favicon Bold.svg">
  <link rel="stylesheet" href="/styles.css">
  <style>
    .sub-page {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
    }

    /* Single left-aligned column — matches the Free UX Resources hero */
    .sub-layout {
      width: 100%;
      max-width: 1080px;
      margin: 0 auto;
      padding: 80px 24px;
    }

    .sub-hero {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .sub-h1 {
      font-family: 'ITC Avant Garde', sans-serif;
      font-weight: 800;
      font-size: clamp(44px, 6.5vw, 80px);
      letter-spacing: -0.03em;
      line-height: 0.96;
      color: var(--dark);
      margin-bottom: 28px;
    }

    .sub-h1 em {
      color: var(--periwinkle);
      font-style: normal;
    }

    .sub-lead {
      font-size: 16px;
      line-height: 1.75;
      color: var(--dark);
      opacity: 0.55;
      max-width: 460px;
      margin-bottom: 0;
    }

    @media (max-width: 860px) {
      .sub-layout {
        padding: 64px 24px;
      }
    }
  </style>
</head>
<body>
  <a href="#main" class="skip-nav">Skip to main content</a>

  <main id="main" class="sub-page">
    <div class="sub-layout">
      <div class="sub-hero">
        <h1 class="sub-h1">one last step</h1>
        <p class="sub-lead">To unlock your resources, please check your email and confirm your subscription by clicking the verification link.</p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-top">
        <div>
          <a href="/" aria-label="emilie mazurek — home">
            <img src="/brand_assets/Emilie rainbow@3x.png" alt="emilie mazurek" class="footer-logo-img">
          </a>
        </div>
        <nav class="footer-nav" aria-label="Footer navigation">
          <a href="/about">About</a>
          <a href="/community">Community</a>
          <a href="/resources">Resources</a>
          <a href="/links">Links</a>
          <a href="/ux-help">UX Help</a>
        </nav>
      </div>
      <div class="footer-bottom">
        <p class="footer-copy">© 2025 Emilie Mazurek. All rights reserved.</p>
      </div>
    </div>
  </footer>
</body>
</html>
